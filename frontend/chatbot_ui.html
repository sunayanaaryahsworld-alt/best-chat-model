<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f9fafb;
            --white: #ffffff;
            --primary: #2563eb;
            --user-bg: #2563eb;
            --bot-bg: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-window {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-row {
            display: flex;
            flex-direction: column;
        }

        .user-row {
            align-items: flex-end;
        }

        .bot-row {
            align-items: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 80%;
        }

        .user-row .bubble {
            background: #2563eb;
            color: white;
        }

        .bot-row .bubble {
            background: #eee;
        }

        .meta {
            font-size: 11px;
            color: gray;
        }

        .input-box {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            border: none;
        }

    </style>
</head>

<body>

<div class="chat-window">

    <div class="header">
        AI Router Hub
        <span style="color:green">● Online</span>
    </div>

    <div id="chat"></div>

    <div class="input-box">
        <input id="prompt" placeholder="Message..."
            onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>

</div>


<script>

const API = "http://127.0.0.1:8000";
const chat = document.getElementById("chat");


function addMsg(text, role, model="") {

    const row = document.createElement("div");
    row.className = `msg-row ${role}-row`;

    row.innerHTML = `
        <div class="bubble">${text}</div>
        ${model ? `<div class="meta">${model}</div>` : ""}
    `;

    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}


async function send() {

    const input = document.getElementById("prompt");
    const text = input.value.trim();

    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    try {

        const res = await fetch(`${API}/chat`, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: text
            })

        });

        const data = await res.json();

        if (data.response) {

            addMsg(
                data.response,
                "bot",
                (data.model_used || "MODEL").toUpperCase()
            );

        } else {

            addMsg("Unknown error", "bot", "SYSTEM");

        }

    } catch (e) {

        addMsg("Connection error", "bot", "SYSTEM");

    }

}

</script>

</body>
</html>
