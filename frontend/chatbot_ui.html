<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9fafb;
            --white: #ffffff;
            --primary: #2563eb;
            --user-bg: #2563eb;
            --bot-bg: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            display: flex; justify-content: center; height: 100vh;
        }

        /* Layout */
        .chat-window {
            width: 100%; max-width: 700px;
            display: flex; flex-direction: column;
            background: var(--white); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        .header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            font-weight: 600; font-size: 16px; display: flex; align-items: center; justify-content: space-between;
        }

        /* Chat Feed */
        #chat {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* Message Bubbles & Alignment */
        .msg-row { display: flex; width: 100%; flex-direction: column; }
        
        /* User: Right Aligned */
        .user-row { align-items: flex-end; }
        .user-row .bubble { background: var(--user-bg); color: white; border-bottom-right-radius: 4px; }

        /* Bot: Left Aligned */
        .bot-row { align-items: flex-start; }
        .bot-row .bubble { background: var(--bot-bg); color: var(--text-main); border-bottom-left-radius: 4px; }

        .bubble {
            max-width: 80%; padding: 10px 16px; border-radius: 18px;
            font-size: 14.5px; line-height: 1.5;
            animation: fadeIn 0.2s ease-out;
        }

        .meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

        /* Input Area */
        .input-box {
            padding: 20px; border-top: 1px solid var(--border);
            display: flex; gap: 12px;
        }

        input {
            flex: 1; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 8px; outline: none; font-size: 14px; transition: 0.2s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }

        button {
            padding: 0 20px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="chat-window">
    <div class="header">
        <span>AI Router Hub</span>
        <span style="color: #10b981; font-size: 12px;">● Online</span>
    </div>

    <div id="chat"></div>

    <div class="input-box">
        <input id="prompt" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
    const API = "http://127.0.0.1:8000";
    const chat = document.getElementById("chat");

    function addMsg(text, role, model = "") {
        const row = document.createElement("div");
        row.className = `msg-row ${role}-row`;
        
        row.innerHTML = `
            <div class="bubble">${text}</div>
            ${model ? `<div class="meta">${model}</div>` : ''}
        `;
        
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
        const input = document.getElementById("prompt");
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";

        try {
            const res = await fetch(`${API}/chat?q=${encodeURIComponent(text)}`);
            const data = await res.json();
            addMsg(data.response, 'bot', data.model_used.toUpperCase());
        } catch (e) {
            addMsg("Connection error.", 'bot', "SYSTEM");
        }
    }
</script>

</body>
</html>
